<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frankie Stone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: url('https://images.pexels.com/photos/2860703/pexels-photo-2860703.jpeg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #333;
        }
        
        .tagline {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 40px;
            font-style: italic;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .link-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
        }
        
        .link-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .link-button.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .link-button.secondary:hover {
            background: #f8f9ff;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .social-link {
            color: #667eea;
            font-size: 1.5em;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .social-link:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to my digihome</h1>
        <p class="tagline">"Smile and the world will smile back"</p>

        <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A1902478572&color=%23c5bdb8&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe><div style="font-size: 10px; color: #cccccc;line-break: anywhere;word-break: normal;overflow: hidden;white-space: nowrap;text-overflow: ellipsis; font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;font-weight: 100;"><a href="https://soundcloud.com/frankiestone" title="Frankie Stone" target="_blank" style="color: #cccccc; text-decoration: none;">Frankie Stone</a> · <a href="https://soundcloud.com/frankiestone/with-me-demo" title="With Me - DEMO" target="_blank" style="color: #cccccc; text-decoration: none;">With Me - DEMO</a></div>
        
        <div class="links">
            <a href="/spaceship/" class="link-button">🚀 Explore the Journey (funzone)</a>
        </div>
        
        <div class="social-links">
            <a href="https://www.instagram.com/franki3stone/" class="social-link" target="_blank" title="Instagram">📷</a>
            <a href="https://x.com/franki3stone" class="social-link" target="_blank" title="X (Twitter)">𝕏</a>
            <a href="https://www.tiktok.com/@frankie.in.uk" class="social-link" target="_blank" title="TikTok">🎵</a>
            <a href="mailto:frankie@thefrankiestone.com" class="social-link" title="Email">✉️</a>
        </div>
    </div>

  <script>
  document.body.appendChild(popup);
  
  const overlay = popup.querySelector('.winamp-overlay');
  const closeBtn = popup.querySelector('.close-btn');
  const playBtn = popup.querySelector('.winamp-button');
  const popupEl = popup.querySelector('.winamp-popup');
  const titlebar = popup.querySelector('.winamp-titlebar');
  
  function closePopup() {
    popup.remove();
  }
  
  closeBtn.onclick = closePopup;
  overlay.onclick = closePopup;
  
  playBtn.onclick = function() {
    window.location.href = 'https://thefrankiestone.com/sonic-spaceship.html';
  };
  
  // Draggable
  let isDragging = false;
  let currentX, currentY, initialX, initialY;
  
  titlebar.addEventListener('mousedown', dragStart);
  document.addEventListener('mousemove', drag);
  document.addEventListener('mouseup', dragEnd);
  
  function dragStart(e) {
    if (e.target.classList.contains('winamp-btn')) return;
    initialX = e.clientX - popupEl.offsetLeft;
    initialY = e.clientY - popupEl.offsetTop;
    isDragging = true;
  }
  
  function drag(e) {
    if (isDragging) {
      e.preventDefault();
      currentX = e.clientX - initialX;
      currentY = e.clientY - initialY;
      popupEl.style.transform = 'none';
      popupEl.style.left = currentX + 'px';
      popupEl.style.top = currentY + 'px';
    }
  }
  
  function dragEnd() {
    isDragging = false;
  }
})();
    </script>
</body>
</html>
